name: Staging health checks

on:
  workflow_dispatch:
    inputs:
      test_notifications:
        description: 'Force failure to test Discord, Framateam and email notifications'
        type: boolean
        default: false
  schedule:
    - cron: '0 * * * *'

jobs:
  healthcheck:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Force failure (notification test)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.test_notifications }}
        run: exit 1
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'yarn'
      - name: Install dependencies
        run: yarn --frozen-lockfile
      - name: Install Playwright browser
        run: npx playwright install --with-deps
      - name: Run health check
        run: yarn workspace ops test
        env:
          URL: https://seeds.bleumatin.fr
          EMAIL: prod@bleumatin.fr
          PASSWORD: ${{ secrets.STAGING_HEALTH_CHECK_PASSWORD }}
      - name: Failure notification
        if: ${{ failure() }}
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_MONITORING_WEBHOOK }}
        with:
          args: 'The Health Check has failed for SEEDS Staging'
      - name: Framateam failure notification
        if: ${{ failure() }}
        uses: mattermost/action-mattermost-notify@master
        with:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.FRAMATEAM_MONITORING_WEBHOOK }}
          TEXT: |
            :warning: The Health Check has failed for SEEDS Staging
            [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
      - name: Email failure notification
        if: ${{ failure() }}
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: mail.infomaniak.ch
          server_port: 465
          secure: true
          username: ${{ secrets.HEALTH_CHECK_SMTP_USERNAME }}
          password: ${{ secrets.HEALTH_CHECK_SMTP_PASSWORD }}
          subject: 'SEEDS Staging health check failed'
          to: ${{ secrets.HEALTH_CHECK_NOTIFICATION_EMAILS }}
          from: ${{ secrets.HEALTH_CHECK_SMTP_FROM }}
          body: |
            The Health Check has failed for SEEDS Staging.

            View workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
